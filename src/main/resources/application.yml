spring:
  application:
    name: axon-demo
  datasource:
    url: jdbc:h2:mem:axondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

axon:
  axonserver:
    enabled: false
  serializer:
    general: jackson3
    events: jackson3
    messages: jackson3
  eventhandling:
    processors:
      transaction-history-projection:
        mode: subscribing
